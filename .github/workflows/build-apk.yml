name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ถอยมาใช้ Java 17 เพื่อความเข้ากันได้แบบร้อยเปอร์เซ็นต์
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ปรับรุ่น Gradle ลงมาที่เวอร์ชัน 8.10 ซึ่งเป็นเวอร์ชันสากลที่เสถียรกับ KSP ที่สุด
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10' 

      - name: Generate Dummy Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # ใช้คำสั่งบิลด์มาตรฐานแบบล้างแคช เพื่อให้ได้ไฟล์เวอร์ชันใหม่พอร์ต 6667 สดใหม่แน่นอน
      - name: Build Debug APK
        run: gradle assembleDebug -x lint --no-build-cache
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppChat-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
